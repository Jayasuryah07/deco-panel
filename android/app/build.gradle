plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "9"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0.9"

android {
    namespace "com.deco.decoapp"
    compileSdk = 36  // ✅ Use stable SDK (36 not officially stable yet)
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.deco.decoapp"
        minSdk = flutter.minSdkVersion
        targetSdk = 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation platform("com.google.firebase:firebase-bom:33.8.0")
    implementation "com.google.firebase:firebase-analytics-ktx:21.5.0"
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.browser:browser:1.8.0"
    implementation "androidx.appcompat:appcompat:1.7.0"  // ✅ Replaces old support lib
}